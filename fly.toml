# Fly.io config for the public read-only Vouchsafe demo.
# One-time: `fly auth login && fly launch --copy-config --no-deploy && fly deploy`
app = "vouchsafe-demo"
primary_region = "sin"

[env]
  READ_ONLY = "1"

[http_service]
  internal_port = 7900
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
